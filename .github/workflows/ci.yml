name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check src/

      - name: ruff format --check
        run: uv run ruff format --check src/

      - name: pytest
        run: uv run pytest
